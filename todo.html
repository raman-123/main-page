<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do App</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .todo-container {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    input {
      width: 70%;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px;
      border: none;
      background: #38bdf8;
      border-radius: 5px;
      cursor: pointer;
      margin-left: 5px;
    }

    ul {
      list-style: none;
      margin-top: 20px;
      padding: 0;
    }

    li {
      background: #334155;
      margin: 5px 0;
      padding: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
    }

    .delete {
      background: red;
      color: white;
      padding: 5px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="todo-container">
  <h2>📝 To-Do List</h2>

  <input type="text" id="taskInput" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>
</div>

<script>
function addTask() {
  let input = document.getElementById("taskInput");
  let task = input.value;

  if (task === "") return;

  let li = document.createElement("li");
  li.innerHTML = task + ' <span class="delete" onclick="removeTask(this)">X</span>';

  document.getElementById("taskList").appendChild(li);

  input.value = "";
}

function removeTask(element) {
  element.parentElement.remove();
}
</script>

</body>
</html>
