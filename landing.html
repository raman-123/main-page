<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Landing Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: #020617;
    }

    header h1 {
      color: #38bdf8;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    nav a:hover {
      color: #38bdf8;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h2 {
      font-size: 40px;
    }

    .hero p {
      color: #cbd5e1;
      margin: 15px 0;
    }

    .btn {
      background: #38bdf8;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:hover {
      background: #0ea5e9;
      color: white;
    }

    /* Features */
    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 50px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<header>
  <h1>TechNova</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Build Modern Websites Easily</h2>
  <p>We create fast, responsive and modern web solutions.</p>
  <button class="btn">Get Started</button>
</section>

<section class="features">
  <div class="card">⚡ Fast Performance</div>
  <div class="card">🎨 Modern Design</div>
  <div class="card">📱 Mobile Friendly</div>
</section>

<footer>
  <p>© 2026 TechNova</p>
</footer>

</body>
</html>
